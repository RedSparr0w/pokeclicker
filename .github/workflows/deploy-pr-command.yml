name: 🔂 PR Preview Command

on:
  issue_comment:
    types: [created]

permissions:
  pull-requests: write
  actions: write

jobs:
  deploy-preview:
    if: >
      github.event.issue.pull_request &&
      github.event.comment.body == '/deploy-preview'

    runs-on: ubuntu-latest

    steps:
      - name: Check User Permission
        id: checkAccess
        uses: actions-cool/check-user-permission@v2
        with:
          require: write
          username: ${{ github.event.comment.user.login }}

      - name: Stop unauthorized users
        if: steps.checkAccess.outputs.require-result == 'false'
        run: |
          echo "${{ github.event.comment.user.login }} does not have permission to deploy previews."
          exit 1

      - name: Trigger deployment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'pr-preview-deploy.yml',
              ref: 'main',
              inputs: {
                pr_number: String(context.issue.number)
              }
            })

      - name: Comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '🔂 Preview deployment started.'
            })