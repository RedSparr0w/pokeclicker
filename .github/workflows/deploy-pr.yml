name: 🔂 PR Preview

on:
  pull_request_target:
    types: [opened, synchronize, reopened, closed]
    paths:
      - 'src/**/*.ts'
      - 'src/**/*.html'
      - 'src/**/*.less'
      - 'src/**/*.ejs'

jobs:
  preview:
    environment: pokeclicker-development
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Get User Permission
        id: checkAccess
        uses: actions-cool/check-user-permission@v2
        with:
          require: write
          username: ${{ github.triggering_actor }}

      - name: Check User Permission
        if: steps.checkAccess.outputs.require-result == 'false'
        run: |
          echo "${{ github.triggering_actor }} does not have permissions on this repo."
          echo "Current permission level is ${{ steps.checkAccess.outputs.user-permission }}"
          echo "Job originally triggered by ${{ github.actor }}"
          exit 0

      - name: Checkout PR
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Build PR
        run: |
          set -euo pipefail
          npm ci
          echo "module.exports={DEVELOPMENT:true,DEV_BANNER:true};" >> config.js
          npm run build

          # ---------------------------
          # Remove assets and libs folders; they will be redirected via SW
          # ---------------------------
          rm -rf build/assets
          rm -rf build/libs

          # Remove any remaining symlinks just in case
          find build -type l -exec rm -f {} +

          # ---------------------------
          # Inject SW registration + auto-refresh into HTML
          # ---------------------------
          for HTML_FILE in build/*.html; do
            [ -f "$HTML_FILE" ] || continue
            sed -i '/<\/head>/i \
<script>\
if("serviceWorker" in navigator){\
navigator.serviceWorker.register("/sw.js",{scope:"/"}).then(reg=>{if(reg.waiting)reg.waiting.postMessage({type:"SKIP_WAITING"});});\
navigator.serviceWorker.addEventListener("controllerchange",()=>{if(window._reloading)return;window._reloading=true;window.location.reload();});\
}\
</script>' "$HTML_FILE"
          done

      - name: Deploy to GH-Pages
        uses: redsparr0w/pr-preview-action@e42785b6369079700cfd810f51d14da466ea5cce
        id: preview_step
        with:
          source-dir: 'build'
          preview-branch: 'master'
          umbrella-dir: 'docs/preview'
          custom-url: 'dev.pokeclicker.com'
          deploy-repository: 'RedSparr0w/pokeclicker'
          token: ${{ secrets.DEV_PAGE }}
          pages-base-dir: 'docs/'

      - name: Preview URL
        run: echo "url => ${{ steps.preview_step.outputs.deployment-url }}"
