name: 🔂 PR Preview

on:
  pull_request_target:
    types:
      - labeled
      - closed
    paths:
      - 'src/**/*.ts'
      - 'src/**/*.html'
      - 'src/**/*.less'
      - 'src/**/*.ejs'

jobs:
  preview:
    if: |
      github.event.action == 'closed' ||
      github.event.label.name == 'deploy-preview'

    environment: pokeclicker-development
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Get User Permission
        id: checkAccess
        if: github.event.action != 'closed'
        uses: actions-cool/check-user-permission@v2
        with:
          require: write
          username: ${{ github.actor }}

      - name: Check User Permission
        if: |
          github.event.action != 'closed' &&
          steps.checkAccess.outputs.require-result == 'false'
        run: |
          echo "${{ github.actor }} does not have permissions on this repo."
          echo "Current permission level is ${{ steps.checkAccess.outputs.user-permission }}"
          exit 1

      - name: Checkout PR
        if: github.event.action != 'closed'
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
          allow-unsafe-pr-checkout: true

      - name: Build PR
        if: github.event.action != 'closed'
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: Build
        if: github.event.action != 'closed'
        run: |
          npm ci
          echo "module.exports={DEVELOPMENT:true,DEV_BANNER:true};" >> config.js
          npm run build
          rm -rf build/assets
          rm -rf build/libs
          perl -0pi -e 's|</title>|</title>\n<script>\nif("serviceWorker" in navigator){\nnavigator.serviceWorker.register("/sw.js",{scope:"/"}).then(reg=>{if(reg.waiting)reg.waiting.postMessage({type:"SKIP_WAITING"});});\nnavigator.serviceWorker.addEventListener("controllerchange",()=>{if(window._reloading)return;window._reloading=true;window.location.reload();});\n}\n</script>|s' build/index.html

      - name: Deploy to GH-Pages
        id: preview_step
        uses: mvk/pr-preview-action@5ce80c4514b76075e126b7dbcd7674a7ff4183dd
        with:
          source-dir: 'build'
          preview-branch: 'master'
          umbrella-dir: 'docs/preview'
          pages-base-url: 'dev.pokeclicker.com'
          deploy-repository: 'RedSparr0w/pokeclicker'
          token: ${{ secrets.DEV_PAGE }}
          pages-base-path: 'docs/'
          qr-code: false

      - name: Preview URL
        if: github.event.action != 'closed'
        run: echo "url => ${{ steps.preview_step.outputs.deployment-url }}"

      - name: Replace deploy label with deployed label
        if: |
          github.event.action == 'labeled' &&
          success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              name: 'deploy-preview'
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['preview-deployed']
            });